<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Character Analytics - Pill Chart</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-container": "#f2d2fe",
                        "tertiary-dim": "#624a6e",
                        "outline-variant": "#adb3b5",
                        "error": "#a83836",
                        "on-primary-fixed-variant": "#2f645c",
                        "on-primary-container": "#245a52",
                        "background": "#f8f9fa",
                        "on-secondary-fixed-variant": "#73544b",
                        "on-secondary-container": "#694b42",
                        "on-primary": "#e2fff8",
                        "inverse-primary": "#bef6eb",
                        "outline": "#767c7e",
                        "error-dim": "#67040d",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#fff7f6",
                        "tertiary": "#6f567b",
                        "secondary": "#77584e",
                        "on-tertiary": "#fff7fc",
                        "primary": "#33685f",
                        "surface-container-low": "#f1f4f5",
                        "surface-dim": "#d5dbdd",
                        "secondary-fixed-dim": "#f5cbbf",
                        "surface-tint": "#33685f",
                        "primary-fixed": "#b6eee2",
                        "on-error-container": "#6e0a12",
                        "tertiary-fixed": "#f2d2fe",
                        "error-container": "#fa746f",
                        "surface-container-highest": "#dee3e6",
                        "surface-bright": "#f8f9fa",
                        "secondary-container": "#ffdbd0",
                        "on-secondary": "#fff7f5",
                        "surface-variant": "#dee3e6",
                        "primary-fixed-dim": "#a8dfd4",
                        "primary-dim": "#255c53",
                        "primary-container": "#b6eee2",
                        "inverse-surface": "#0c0f10",
                        "on-background": "#2d3335",
                        "inverse-on-surface": "#9b9d9e",
                        "on-secondary-fixed": "#543930",
                        "on-tertiary-fixed": "#4a3355",
                        "surface-container": "#ebeef0",
                        "secondary-fixed": "#ffdbd0",
                        "tertiary-fixed-dim": "#e3c4ef",
                        "secondary-dim": "#6a4c43",
                        "on-primary-fixed": "#0b4740",
                        "surface-container-high": "#e5e9eb",
                        "on-tertiary-fixed-variant": "#674f73",
                        "on-surface-variant": "#5a6062",
                        "on-surface": "#2d3335",
                        "on-tertiary-container": "#5d4569",
                        "surface": "#f8f9fa"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .pill-character {
            position: relative;
            transition: transform 0.3s ease;
        }

        .pill-character:hover {
            transform: scaleY(1.05);
            filter: brightness(1.05);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-8">
    <!-- Standalone Analytics Canvas -->
    <main
        class="w-full max-w-5xl aspect-[16/9] bg-surface-container-lowest rounded-xl shadow-xl shadow-on-surface/5 flex flex-col p-12 relative overflow-hidden">
        <!-- Subtle Branding Overlay -->
        <div class="absolute top-8 left-12 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center">
                <span class="material-symbols-outlined text-primary" data-icon="bar_chart">bar_chart</span>
            </div>
            <div>
                <h1 class="font-headline font-extrabold tracking-tight text-on-surface text-xl">Character Analytics</h1>
                <p class="text-on-surface-variant text-sm font-medium tracking-wide">Pill Chart Editorial</p>
            </div>
        </div>
        <!-- Y-Axis & Graph Container -->
        <div class="flex-1 mt-20 flex">
            <!-- Y-Axis Labels -->
            <div
                class="flex flex-col justify-between items-end pr-6 pb-12 text-on-surface-variant/40 font-bold text-xs tracking-tighter">
                <span>120</span>
                <span>100</span>
                <span>80</span>
                <span>60</span>
                <span>40</span>
                <span>20</span>
                <span>0</span>
            </div>
            <!-- Chart Bed -->
            <div
                class="flex-1 flex items-end justify-around border-b border-surface-container-highest pb-2 relative h-full">
                <!-- Horizontal Guide Lines (Ghost Borders) -->
                <div class="absolute inset-0 flex flex-col justify-between pointer-events-none opacity-20">
                    <div class="w-full border-t border-outline-variant"></div>
                    <div class="w-full border-t border-outline-variant"></div>
                    <div class="w-full border-t border-outline-variant"></div>
                    <div class="w-full border-t border-outline-variant"></div>
                    <div class="w-full border-t border-outline-variant"></div>
                    <div class="w-full border-t border-outline-variant"></div>
                </div>
                <!-- Character 1: Mint -->
                <div class="group relative flex flex-col items-center">
                    <div
                        class="pill-character w-16 h-48 bg-gradient-to-b from-primary-fixed to-primary-fixed-dim rounded-full shadow-lg shadow-primary/10 flex flex-col items-center pt-8 border-t border-white/40">
                        <!-- Hair -->
                        <div class="absolute -top-1 flex gap-1">
                            <div class="w-1.5 h-3 bg-primary rounded-full rotate-[-15deg]"></div>
                            <div class="w-1.5 h-4 bg-primary rounded-full"></div>
                        </div>
                        <!-- Eyes looking right -->
                        <div class="flex gap-2.5 translate-x-1.5">
                            <div class="w-1.5 h-1.5 bg-on-primary-fixed rounded-full"></div>
                            <div class="w-1.5 h-1.5 bg-on-primary-fixed rounded-full"></div>
                        </div>
                        <!-- Mouth -->
                        <div class="w-3 h-0.5 bg-on-primary-fixed/40 rounded-full mt-2 translate-x-1"></div>
                    </div>
                    <span class="mt-4 font-bold text-xs text-on-surface-variant uppercase tracking-widest">Alpha</span>
                </div>
                <!-- Character 2: Peach -->
                <div class="group relative flex flex-col items-center">
                    <div
                        class="pill-character w-16 h-80 bg-gradient-to-b from-secondary-fixed to-secondary-fixed-dim rounded-full shadow-lg shadow-secondary/10 flex flex-col items-center pt-8 border-t border-white/40">
                        <!-- Hair -->
                        <div class="absolute -top-1 flex gap-0.5">
                            <div class="w-4 h-2 bg-on-secondary-fixed-variant rounded-full"></div>
                        </div>
                        <!-- Eyes looking right -->
                        <div class="flex gap-2.5 translate-x-1.5">
                            <div class="w-1.5 h-1.5 bg-on-secondary-fixed rounded-full"></div>
                            <div class="w-1.5 h-1.5 bg-on-secondary-fixed rounded-full"></div>
                        </div>
                        <!-- Mouth -->
                        <div class="w-3 h-1 border-b border-on-secondary-fixed/50 rounded-full mt-1.5 translate-x-1">
                        </div>
                    </div>
                    <span class="mt-4 font-bold text-xs text-on-surface-variant uppercase tracking-widest">Beta</span>
                </div>
                <!-- Character 3: Lavender -->
                <div class="group relative flex flex-col items-center">
                    <div
                        class="pill-character w-16 h-64 bg-gradient-to-b from-tertiary-fixed to-tertiary-fixed-dim rounded-full shadow-lg shadow-tertiary/10 flex flex-col items-center pt-8 border-t border-white/40">
                        <!-- Hair -->
                        <div class="absolute -top-1">
                            <div class="w-2 h-4 bg-tertiary rounded-full rotate-[10deg]"></div>
                        </div>
                        <!-- Eyes looking right -->
                        <div class="flex gap-2.5 translate-x-1.5">
                            <div class="w-1.5 h-1.5 bg-on-tertiary-fixed rounded-full"></div>
                            <div class="w-1.5 h-1.5 bg-on-tertiary-fixed rounded-full"></div>
                        </div>
                        <!-- Mouth -->
                        <div class="w-2 h-2 rounded-full border border-on-tertiary-fixed/30 mt-2 translate-x-1"></div>
                    </div>
                    <span class="mt-4 font-bold text-xs text-on-surface-variant uppercase tracking-widest">Gamma</span>
                </div>
                <!-- Character 4: Soft Grey/Mint Mixed -->
                <div class="group relative flex flex-col items-center">
                    <div
                        class="pill-character w-16 h-[22rem] bg-gradient-to-b from-surface-container-highest to-surface-dim rounded-full shadow-lg shadow-on-surface/5 flex flex-col items-center pt-8 border-t border-white/60">
                        <!-- Hair -->
                        <div class="absolute -top-1 flex gap-1">
                            <div class="w-1 h-3 bg-on-surface-variant rounded-full -rotate-12"></div>
                            <div class="w-1 h-3 bg-on-surface-variant rounded-full rotate-12"></div>
                        </div>
                        <!-- Eyes looking forward (Last bar) -->
                        <div class="flex gap-2.5">
                            <div class="w-1.5 h-1.5 bg-on-surface rounded-full"></div>
                            <div class="w-1.5 h-1.5 bg-on-surface rounded-full"></div>
                        </div>
                        <!-- Mouth -->
                        <div class="w-4 h-0.5 bg-on-surface/30 rounded-full mt-2"></div>
                    </div>
                    <span class="mt-4 font-bold text-xs text-on-surface-variant uppercase tracking-widest">Delta</span>
                </div>
            </div>
        </div>
        <!-- Legend / Footer -->
        <div class="mt-12 flex justify-between items-center">
            <div class="flex gap-6">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-primary-fixed"></div>
                    <span class="text-xs font-semibold text-on-surface-variant">Production</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-secondary-fixed"></div>
                    <span class="text-xs font-semibold text-on-surface-variant">Research</span>
                </div>
            </div>
            <div class="px-6 py-2 bg-surface-container-low rounded-full">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant">Live Data Stream •
                    100% Sync</p>
            </div>
        </div>
        <!-- Decorative Background Elements -->
        <div class="absolute -bottom-16 -right-16 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
        <div class="absolute -top-16 -left-16 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
    </main>
</body>

</html>
