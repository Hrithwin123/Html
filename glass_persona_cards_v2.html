<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: #f2f2f7;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  }

  .grid {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
  }

  .card {
    width: 168px;
    border-radius: 24px;
    padding: 22px 16px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);

    /* the actual glass: nearly transparent */
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);

    /* crisp glass edge */
    border: 1px solid rgba(255, 255, 255, 0.55);

    box-shadow:
      /* inner top highlight */
      inset 0 1px 0 rgba(255, 255, 255, 0.90),
      /* inner bottom shadow */
      inset 0 -1px 0 rgba(180, 185, 220, 0.18),
      /* inner left glint */
      inset 1px 0 0 rgba(255, 255, 255, 0.45),
      /* outer lift */
      0 8px 32px rgba(0, 0, 0, 0.09),
      0 2px 8px rgba(0, 0, 0, 0.06);
  }

  .card:hover {
    transform: scale(1.04) translateY(-2px);
  }

  /* frosted sheen — diagonal bright band top-left */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    background: linear-gradient(135deg,
        rgba(255, 255, 255, 0.32) 0%,
        rgba(255, 255, 255, 0.06) 40%,
        rgba(255, 255, 255, 0.00) 65%,
        rgba(200, 205, 240, 0.08) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* specular streak — top edge glint */
  .card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 15%;
    right: 15%;
    height: 1px;
    background: linear-gradient(90deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 1) 50%,
        rgba(255, 255, 255, 0) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .card>* {
    position: relative;
    z-index: 2;
  }

  /* shimmer on hover */
  .shimmer {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    background: linear-gradient(135deg,
        rgba(255, 255, 255, 0) 30%,
        rgba(255, 255, 255, 0.22) 50%,
        rgba(255, 255, 255, 0) 70%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    z-index: 3;
  }

  .card:hover .shimmer {
    opacity: 1;
  }

  /* status dot */
  .status-dot {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 255, 255, 0.85);
    z-index: 4;
  }

  .dot-active {
    background: #34c759;
    box-shadow: 0 0 5px rgba(52, 199, 89, 0.55);
  }

  .dot-away {
    background: #ff9f0a;
    box-shadow: 0 0 5px rgba(255, 159, 10, 0.45);
  }

  .dot-offline {
    background: #c7c7cc;
  }

  /* avatar */
  .avatar-wrap {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    margin-bottom: 11px;
    position: relative;
    flex-shrink: 0;
  }

  /* glass ring around avatar */
  .avatar-wrap::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.7);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    z-index: 0;
  }

  .avatar-img {
    position: relative;
    z-index: 1;
    width: 68px;
    height: 68px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .av-purple {
    background: linear-gradient(135deg, #c4bef7, #a89fec);
    color: #3c3489;
  }

  .av-rose {
    background: linear-gradient(135deg, #f9c4d2, #f0a0bc);
    color: #72243e;
  }

  .av-teal {
    background: linear-gradient(135deg, #a8e8cc, #7dd4b0);
    color: #085041;
  }

  .av-amber {
    background: linear-gradient(135deg, #fad99a, #f5c165);
    color: #633806;
  }

  .av-blue {
    background: linear-gradient(135deg, #b8d8f8, #8ec0f2);
    color: #0c447c;
  }

  .card-name {
    font-size: 13.5px;
    font-weight: 600;
    color: #1c1c1e;
    text-align: center;
    letter-spacing: -0.1px;
    line-height: 1.2;
    margin-bottom: 3px;
  }

  .card-role {
    font-size: 11px;
    color: rgba(50, 50, 72, 0.58);
    text-align: center;
    margin-bottom: 2px;
  }

  .card-location {
    font-size: 10.5px;
    color: rgba(50, 50, 72, 0.38);
    text-align: center;
    margin-bottom: 12px;
  }

  /* glass pill badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 11px;
    border-radius: 20px;
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.2px;
    /* glass treatment on badge too */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid;
  }

  .badge-negative {
    background: rgba(255, 59, 48, 0.12);
    border-color: rgba(255, 59, 48, 0.28);
    color: #c0392b;
  }

  .badge-positive {
    background: rgba(52, 199, 89, 0.12);
    border-color: rgba(52, 199, 89, 0.30);
    color: #1a7a38;
  }

  .badge-neutral {
    background: rgba(142, 142, 147, 0.13);
    border-color: rgba(142, 142, 147, 0.30);
    color: #48484f;
  }

  .badge-mixed {
    background: rgba(255, 159, 10, 0.12);
    border-color: rgba(255, 159, 10, 0.30);
    color: #8a5500;
  }

  .badge-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .badge-negative .badge-dot {
    background: #e03020;
  }

  .badge-positive .badge-dot {
    background: #28a745;
  }

  .badge-neutral .badge-dot {
    background: #8e8e93;
  }

  .badge-mixed .badge-dot {
    background: #e09000;
  }

  /* bg */
  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(72px);
    opacity: 0.42;
  }

  .b1 {
    width: 380px;
    height: 380px;
    background: #c5d5ff;
    top: -110px;
    left: -90px;
  }

  .b2 {
    width: 300px;
    height: 300px;
    background: #ffc8dc;
    bottom: -80px;
    right: -60px;
  }

  .b3 {
    width: 240px;
    height: 240px;
    background: #bef0d8;
    top: 30%;
    left: 52%;
  }

  .b4 {
    width: 200px;
    height: 200px;
    background: #fff0c0;
    top: 10%;
    right: 5%;
  }
</style>

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
</div>
